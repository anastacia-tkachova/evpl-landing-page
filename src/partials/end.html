<section class="container" id="end">
  <div class="end-container">
    <img
      class="end-basket"
      src="./img/end-1-1x.png"
      srcset="./img/end-1-1x.png, ./img/end-1-2x.png"
      alt="a cart with packages"
      width="172"
      loading="lazy"
      decoding="async"
    />
    <div class="end-ready">
      <h2 class="end-title">
        Ready To Clear<br />
        The Next Delivery Challenge?
      </h2>
      <img
        class="end-logo-img"
        src="./img/end-2-1x.png"
        srcset="./img/end-2-1x.png, ./img/end-2-2x.png"
        alt="Duck, Ball, and Bear"
        width="72"
        loading="lazy"
        decoding="async"
      />
    </div>
    <div class="end-btn-address">
      <a
        class="end-btn"
        href="https://play.google.com/store/apps/details?id=com.matchdelivery.triple3d"
        target="_blank"
        rel="noopener noreferrer"
      >
        <svg class="end-svg" width="22" height="24">
          <use href="./img/sprite.svg#icon-google-play"></use>
        </svg>
        <span class="end-link-text">Play on Google Play</span>
      </a>

      <address class="end-address">
        <svg class="end-address-svg" width="24" height="24">
          <use href="./img/sprite.svg#icon-email"></use>
        </svg>
        <a class="end-link-email" href="mailto:info@bluevia.it.com">
          info@bluevia.it.com
        </a>
      </address>
    </div>
    <img
      class="end-logo-desktop"
      src="./img/end-2-1x.png"
      srcset="./img/end-2-1x.png, ./img/end-2-2x.png"
      alt="Duck, Ball, and Bear"
      width="172"
      loading="lazy"
      decoding="async"
    />
  </div>
</section>
